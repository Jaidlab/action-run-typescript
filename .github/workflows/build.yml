name: build
on:
  push:
    branches: [main]
  pull_request:
jobs:
  selfTest:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6.0.2
    - name: runLocalAction
      uses: ./
      with:
        globals: |-
          {
            expectedRepository: ${{ toJson(github.repository) }},
          }
        code: |-
          import {mkdir} from 'node:fs/promises'
          import packageJson from './package.json'
          import {globby} from 'globby'

          await mkdir('out', {recursive: true})
          await Bun.write('out/action-self-test.json', JSON.stringify({
            currentWorkingDirectory: process.cwd(),
            expectedWorkspace: process.env.GITHUB_WORKSPACE,
            globbyType: typeof globby,
            packageName: packageJson.name,
            repository: github.repository,
            expectedRepository,
          }, null, 2))
    - name: assertSelfTestOutput
      run: |
        node --input-type=module <<'EOF'
        import assert from 'node:assert/strict'
        import fs from 'node:fs'

        const output = JSON.parse(fs.readFileSync('out/action-self-test.json', 'utf8'))

        assert.ok(output.expectedWorkspace, 'Expected GITHUB_WORKSPACE to be set.')
        assert.equal(output.currentWorkingDirectory, output.expectedWorkspace)
        assert.equal(output.globbyType, 'function')
        assert.equal(output.packageName, 'action-run-typescript')
        assert.equal(output.repository, output.expectedRepository)

        console.log(JSON.stringify(output, null, 2))
        EOF
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6.0.2
    - name: buildDockerImage
      run: docker build --file Dockerfile --tag action-run-typescript:test .
    - name: inspectDockerImageWithSkopeo
      run: |
        mkdir -p out
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          quay.io/skopeo/stable:v1.22.2 \
          inspect docker-daemon:action-run-typescript:test > out/skopeo-inspect.json
    - name: summarizeSkopeoInspect
      run: |
        node --input-type=module <<'EOF'
        import fs from 'node:fs'

        const inputFile = 'out/skopeo-inspect.json'
        const outputFile = 'out/skopeo-inspect.yml'
        const imageReference = 'docker-daemon:action-run-typescript:test'
        const inspect = JSON.parse(fs.readFileSync(inputFile, 'utf8'))

        const indentUnit = '  '
        const quoteKey = key => /^[A-Za-z_][A-Za-z0-9_]*$/.test(key) ? key : JSON.stringify(key)
        const serializeScalar = value => {
          if (value === null) {
            return 'null'
          }
          if (typeof value === 'string') {
            return JSON.stringify(value)
          }
          return String(value)
        }
        const serializeYaml = (value, depth = 0) => {
          const indent = indentUnit.repeat(depth)
          if (Array.isArray(value)) {
            if (value.length === 0) {
              return `${indent}[]`
            }
            return value.map(item => {
              if (item && typeof item === 'object') {
                return `${indent}-\n${serializeYaml(item, depth + 1)}`
              }
              return `${indent}- ${serializeScalar(item)}`
            }).join('\n')
          }
          if (value && typeof value === 'object') {
            const entries = Object.entries(value)
            if (entries.length === 0) {
              return `${indent}{}`
            }
            return entries.map(([key, entryValue]) => {
              const formattedKey = `${indent}${quoteKey(key)}:`
              if (entryValue && typeof entryValue === 'object') {
                return `${formattedKey}\n${serializeYaml(entryValue, depth + 1)}`
              }
              return `${formattedKey} ${serializeScalar(entryValue)}`
            }).join('\n')
          }
          return `${indent}${serializeScalar(value)}`
        }

        const yaml = `---\n${serializeYaml(inspect)}\n`
        fs.writeFileSync(outputFile, yaml)
        fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
          '## skopeo inspect',
          '',
          '<details>',
          `<summary>${imageReference}</summary>`,
          '',
          '```yaml',
          yaml.trimEnd(),
          '```',
          '</details>',
          '',
        ].join('\n'))
        EOF
    - name: analyzeDockerImage
      run: |
        mkdir -p out
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$PWD/out:/out" \
          wagoodman/dive:v0.13.1 \
          action-run-typescript:test \
          --json /out/dive.json
    - name: assertDiveReport
      run: |
        node --input-type=module <<'EOF'
        import assert from 'node:assert/strict'
        import fs from 'node:fs'

        const report = JSON.parse(fs.readFileSync('out/dive.json', 'utf8'))

        assert.deepEqual([...Object.keys(report)].sort(), ['image', 'layer'])
        assert.ok(Array.isArray(report.layer), 'Expected layer to be an array.')
        assert.ok(report.layer.length > 0, 'Expected at least one layer in the dive report.')

        assert.deepEqual([...Object.keys(report.image)].sort(), ['efficiencyScore', 'fileReference', 'inefficientBytes', 'sizeBytes'])
        assert.equal(typeof report.image.sizeBytes, 'number')
        assert.ok(report.image.sizeBytes > 0, 'Expected a positive image size.')
        assert.equal(typeof report.image.inefficientBytes, 'number')
        assert.ok(report.image.inefficientBytes >= 0, 'Expected a non-negative inefficient byte count.')
        assert.equal(typeof report.image.efficiencyScore, 'number')
        assert.ok(report.image.efficiencyScore >= 0 && report.image.efficiencyScore <= 1, 'Expected an efficiency score between 0 and 1.')
        assert.ok(Array.isArray(report.image.fileReference), 'Expected fileReference to be an array.')

        for (const [index, layer] of report.layer.entries()) {
          assert.deepEqual([...Object.keys(layer)].sort(), ['command', 'digestId', 'fileList', 'id', 'index', 'sizeBytes'])
          assert.equal(layer.index, index)
          assert.equal(typeof layer.id, 'string')
          assert.equal(typeof layer.digestId, 'string')
          assert.equal(typeof layer.command, 'string')
          assert.equal(typeof layer.sizeBytes, 'number')
          assert.ok(Array.isArray(layer.fileList), 'Expected each layer to include a fileList array.')
        }

        const normalizeFilePath = path => path.replace(/^\/+/, '')
        const filePaths = new Set(report.layer.flatMap(layer => layer.fileList.map(file => normalizeFilePath(file.path))))
        const filePathList = [...filePaths]
        const assertHasFile = expectedPath => {
          const normalizedExpectedPath = normalizeFilePath(expectedPath)
          const similarPaths = filePathList.filter(path => path.includes(normalizedExpectedPath.split('/').at(-1))).slice(0, 10)
          const similarPathsMessage = similarPaths.length === 0 ? 'none' : similarPaths.join(', ')
          assert.ok(filePaths.has(normalizedExpectedPath), `Expected ${normalizedExpectedPath} in the dive report. Similar paths: ${similarPathsMessage}.`)
        }
        for (const expectedPath of ['usr/local/bin/bun', 'action/package.json', 'action/src/main.ts']) {
          assertHasFile(expectedPath)
        }
        assert.ok(filePathList.some(path => path === 'action/node_modules/json5' || path.startsWith('action/node_modules/json5/') || /action\/node_modules\/\.bun\/[^/]+\/node_modules\/json5(?:\/|$)/.test(path)), 'Expected json5 to be installed in the image.')
        assert.ok(!filePaths.has('action/dist/action.js'), 'Did not expect dist/action.js in the runtime image.')

        console.log(JSON.stringify({
          efficiencyScore: report.image.efficiencyScore,
          fileCount: filePaths.size,
          layerCount: report.layer.length,
          sizeBytes: report.image.sizeBytes,
        }, null, 2))
        EOF
