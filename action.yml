name: run TypeScript
description: Run inline TypeScript in GitHub Actions using Node.js 24.
author: Jaid
inputs:
  code:
    description: TypeScript code to execute.
    required: true
  globals:
    description: Optional JSON5 object. Each top-level field becomes a global variable before your TypeScript runs.
    required: false
  github-token:
    description: GitHub token used for best-effort workflow job step lookup.
    required: false
    default: ${{ github.token }}
runs:
  using: node24
  main: dist/action.js
