name: run TypeScript
description: Run inline TypeScript in GitHub Actions using Bun in a Docker container.
author: Jaid
inputs:
  code:
    description: TypeScript code to execute.
    required: true
  dependencies:
    description: Optional shell-style arguments for `bun add`. They are installed in a fresh temporary folder before execution and exposed through `NODE_PATH`.
    required: false
  globals:
    description: Optional JavaScript expression that must evaluate to an object. Each top-level field becomes a global variable before your TypeScript runs.
    required: false
  goodies:
    description: Optional built-in goodies set. Accepts names like `core`, `core, github`, `['core', 'github']` or `[]` for none.
    required: false
    default: core, github, job, matrix, runner, steps, strategy, workflowJob
  github-token:
    description: GitHub token used for best-effort workflow job step lookup.
    required: false
    default: ${{ github.token }}
runs:
  using: docker
  image: Dockerfile
