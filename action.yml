name: run TypeScript
description: Run inline TypeScript in GitHub Actions using Bun in a Docker container.
author: Jaid
inputs:
  code:
    description: TypeScript code to execute.
    required: true
  globals:
    description: Optional JSON5 object. Each top-level field becomes a global variable before your TypeScript runs.
    required: false
  injectGoodies:
    description: If true, inject built-in goodies like core, github, job, matrix, runner, steps, strategy and workflowJob.
    required: false
    default: 'true'
  github-token:
    description: GitHub token used for best-effort workflow job step lookup.
    required: false
    default: ${{ github.token }}
runs:
  using: docker
  image: Dockerfile
